<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>hello</title>
    </head>
    <body>
        <h3>Hello world</h3>

        <!-- JavaScript 코드 블럭 -->
        <script>
            // 동적 태그 생성
            document.write("<p>Hello World</p>");
            document.write("<p>Hello JavaScript</p>");

            // 콘솔 출력
            console.log("Hello World!");
            console.log("Hello JavaScript!");
        </script>
    </body>
</html>
